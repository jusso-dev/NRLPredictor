# Shared env for all PHP containers. APP_TIMEZONE must be identical everywhere:
# the scheduler's kickoff-window gates and the queue jobs both compare NRL
# (Sydney) kickoff times against now() — a UTC worker fires them ~10h late.
x-app-env: &app-env
  APP_TIMEZONE: Australia/Sydney
  APP_KEY: ${APP_KEY}
  APP_ENV: ${APP_ENV:-production}
  APP_DEBUG: ${APP_DEBUG:-false}
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: ${DB_DATABASE:-nrl_expert}
  DB_USERNAME: ${DB_USERNAME:-nrl}
  DB_PASSWORD: ${DB_PASSWORD:-nrl_secret}
  QUEUE_CONNECTION: database
  CACHE_STORE: database
  SESSION_DRIVER: database
  # Must exceed the longest job $timeout (600s) or the DB queue re-releases
  # jobs that are still running, causing duplicate runs and phantom failures.
  DB_QUEUE_RETRY_AFTER: 660
  ODDS_API_KEY: ${ODDS_API_KEY}
  CODEX_HOME: /root/.codex
  CODEX_MODEL: ${CODEX_MODEL:-}
  CODEX_TIMEOUT_SECONDS: ${CODEX_TIMEOUT_SECONDS:-300}

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-nrl_expert}
      MYSQL_USER: ${DB_USERNAME:-nrl}
      MYSQL_PASSWORD: ${DB_PASSWORD:-nrl_secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secret}"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      <<: *app-env
      APP_URL: http://localhost:8000
    volumes:
      # Codex CLI auth (ChatGPT Pro OAuth). Must stay read-write: the refresh
      # token rotates inside this directory.
      - ${HOME}/.codex:/root/.codex
    ports:
      - "0.0.0.0:8000:8000"
    command:
      - sh
      - -c
      - "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    environment:
      <<: *app-env
    volumes:
      - ${HOME}/.codex:/root/.codex
    # --max-time recycles the worker hourly (docker restarts it) so memory
    # bloat or a wedged process never lingers. Job classes define their own
    # $tries/$timeout; --tries=1 is the default for jobs that don't.
    command: ["php", "artisan", "queue:work", "--tries=1", "--sleep=3", "--max-time=3600"]

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    environment:
      <<: *app-env
    command: ["php", "artisan", "schedule:work"]

volumes:
  mysql-data:
