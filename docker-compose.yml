services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-nrl_expert}
      MYSQL_USER: ${DB_USERNAME:-nrl}
      MYSQL_PASSWORD: ${DB_PASSWORD:-nrl_secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secret}"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_URL: http://localhost:8000
      APP_TIMEZONE: Australia/Sydney
      APP_KEY: ${APP_KEY}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-nrl_expert}
      DB_USERNAME: ${DB_USERNAME:-nrl}
      DB_PASSWORD: ${DB_PASSWORD:-nrl_secret}
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
      CLAUDE_AGENT_SERVICE_URL: http://agent:5000
      CLAUDE_AGENT_CALLBACK_URL: http://app:8000
      CLAUDE_AGENT_INTERNAL_SECRET: ${CLAUDE_AGENT_INTERNAL_SECRET}
      CLAUDE_AGENT_TOKEN: ${CLAUDE_AGENT_TOKEN}
      CLAUDE_AGENT_MODEL: ${CLAUDE_AGENT_MODEL:-claude-sonnet-4-5}
      ODDS_API_KEY: ${ODDS_API_KEY}
    ports:
      - "0.0.0.0:8000:8000"
    command:
      - sh
      - -c
      - "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    environment:
      APP_KEY: ${APP_KEY}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-nrl_expert}
      DB_USERNAME: ${DB_USERNAME:-nrl}
      DB_PASSWORD: ${DB_PASSWORD:-nrl_secret}
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
      CLAUDE_AGENT_SERVICE_URL: http://agent:5000
      CLAUDE_AGENT_CALLBACK_URL: http://app:8000
      CLAUDE_AGENT_INTERNAL_SECRET: ${CLAUDE_AGENT_INTERNAL_SECRET}
      CLAUDE_AGENT_TOKEN: ${CLAUDE_AGENT_TOKEN}
      ODDS_API_KEY: ${ODDS_API_KEY}
    command: ["php", "artisan", "queue:work", "--tries=3", "--sleep=3"]

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    environment:
      APP_KEY: ${APP_KEY}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-nrl_expert}
      DB_USERNAME: ${DB_USERNAME:-nrl}
      DB_PASSWORD: ${DB_PASSWORD:-nrl_secret}
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
      CLAUDE_AGENT_SERVICE_URL: http://agent:5000
      CLAUDE_AGENT_CALLBACK_URL: http://app:8000
      CLAUDE_AGENT_INTERNAL_SECRET: ${CLAUDE_AGENT_INTERNAL_SECRET}
      CLAUDE_AGENT_TOKEN: ${CLAUDE_AGENT_TOKEN}
      ODDS_API_KEY: ${ODDS_API_KEY}
    command: ["php", "artisan", "schedule:work"]

  agent:
    build:
      context: ./python-agent
    restart: unless-stopped
    environment:
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_AGENT_TOKEN}
      CLAUDE_AGENT_TOKEN: ${CLAUDE_AGENT_TOKEN}
      CLAUDE_AGENT_MODEL: ${CLAUDE_AGENT_MODEL:-claude-sonnet-4-5}
      CLAUDE_AGENT_MAX_TURNS: ${CLAUDE_AGENT_MAX_TURNS:-12}
      CLAUDE_AGENT_INTERNAL_SECRET: ${CLAUDE_AGENT_INTERNAL_SECRET}
      CLAUDE_AGENT_CALLBACK_URL: http://app:8000
    ports:
      - "5055:5000"

volumes:
  mysql-data:
